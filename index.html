<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ルベタイマーⅢ</title>

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{text-align:center;}

h1{font-size:48px;}

#display{
  font-size:72px;
  margin:30px 0;
  font-family:monospace;
  font-weight:bold;
}

/* 🌈 虹 */
.rainbow{
  background: linear-gradient(
    90deg,
    red, orange, yellow, lime, cyan, blue, violet
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 🟡 黄色 */
.yellow{
  color:#FFD700;
  text-shadow:0 0 10px rgba(255,215,0,0.8);
}

button{
  font-size:22px;
  padding:12px 28px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  margin:6px;
}
</style>
</head>

<body>

<div class="box">
  <h1>ルベタイマーⅢ</h1>
  <div id="display">待機中</div>

  <div>
    <button onclick="startNormal()">開始</button>
    <button onclick="startFromRainbow()">虹から</button>
    <button onclick="startFromYellow()">黄色から</button>
  </div>
</div>

<audio id="A" src="A.mp4"></audio>
<audio id="B" src="B.mp4"></audio>

<script>
// ===== フェーズ設定 =====
const phases = [
  { type:"rainbow", duration:6.5 },
  { type:"yellow",  duration:22.2 },
  { type:"rainbow", duration:24.2 },
  { type:"yellow",  duration:22.2 }
];

let phaseIndex = 0;
let phaseStartTime = 0;
let beepPlayed = false;
let running = false;

function startNormal(){ startTimer(0); }
function startFromRainbow(){ startTimer(1); }
function startFromYellow(){ startTimer(2); }

function startTimer(startIndex){
  phaseIndex = startIndex;
  phaseStartTime = performance.now();
  beepPlayed = false;
  running = true;
  requestAnimationFrame(update);
}

function update(){
  if(!running) return;

  const now = performance.now();
  const phase = phases[phaseIndex];

  const elapsed = (now - phaseStartTime) / 1000;
  const remaining = phase.duration - elapsed;

  // 🔔 4.3秒前
  if(remaining <= 4.3 && !beepPlayed){
    if(phase.type === "rainbow") A.play();
    else B.play();
    beepPlayed = true;
  }

  // フェーズ終了
  if(remaining <= 0){
    phaseIndex++;
    if(phaseIndex >= phases.length) phaseIndex = 2;

    phaseStartTime = now;
    beepPlayed = false;

    requestAnimationFrame(update);
    return;
  }

  updateDisplay(phase.type, remaining);

  requestAnimationFrame(update);
}

function updateDisplay(type, time){
  const t = time.toFixed(1);

  if(type === "rainbow"){
    display.textContent = `虹の床まで${t}秒`;
    display.className = "rainbow";
  }else{
    display.textContent = `黄色の床まで${t}秒`;
    display.className = "yellow";
  }
}
</script>

</body>
</html>
