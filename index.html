<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>A/B Timer</title>
<style>
body { font-family: sans-serif; text-align:center; margin-top:50px; }
#label { font-size:48px; margin:20px; }
#count { font-size:36px; }
button { font-size:24px; padding:10px 30px; }
</style>
</head>
<body>

<button onclick="start()">開始</button>

<div id="label">待機</div>
<div id="count"></div>

<audio id="voiceA" src="A.mp3"></audio>
<audio id="voiceB" src="B.mp3"></audio>

<script>
let phase = "A";

const DUR_A_TO_B = 20000; // A→B 20秒
const DUR_B_TO_A = 24000; // B→A 24秒

function start() {
  phase = "A";
  document.getElementById("label").textContent = "A";

  setTimeout(() => runPhase("A"), 2500);
}

function runPhase(p) {
  const voice = document.getElementById("voice" + p);
  voice.currentTime = 0;
  voice.play();

  // 虹色まで4秒カウント
  let c = 4;
  document.getElementById("count").textContent = c;
  const countTimer = setInterval(() => {
    c--;
    if (c <= 0) {
      clearInterval(countTimer);
      document.getElementById("count").textContent = "";
    } else {
      document.getElementById("count").textContent = c;
    }
  }, 1000);

  const duration = (p === "A") ? DUR_A_TO_B : DUR_B_TO_A;

  // 次の4秒前に瞬時切替
  setTimeout(() => {
    phase = (p === "A") ? "B" : "A";
    document.getElementById("label").textContent = phase;
  }, duration - 4000);

  // 次フェーズ開始
  setTimeout(() => runPhase(phase), duration);
}
</script>

</body>
</html>
