<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ルベタイマー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
}

h1{ font-size:52px; margin-top:20px; }

#startNote{
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
}

#caption{
  font-size:46px;
  margin:60px 20px;
  min-height:140px;
  font-weight:bold;
}

.rainbow{
  background: linear-gradient(
    90deg,
    red, orange, yellow, green, cyan, blue, violet
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.yellow{ color:#ffd800; }
.normal{ color:white; }

#controls{ margin-top:20px; }

.adjust{
  position:fixed;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
}

.adjust-label{
  font-size:14px;
  margin-bottom:8px;
  opacity:0.7;
}

.adjust button{
  display:block;
  font-size:22px;
  padding:12px;
  margin:8px 0;
}

#resetNote{
  margin-top:10px;
  font-size:16px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>ルベタイマー</h1>

<div id="startNote">
グランドカラミティの表示が出た瞬間に押してください
</div>

<div id="caption"></div>

<div id="controls">
床の間隔（秒）<br>
<input type="number" id="interval" value="16" step="0.1" style="font-size:22px;"><br><br>

<button onclick="toggleTimer()" style="font-size:28px;padding:16px 48px;">
開始 / 停止
</button>

<br><br>

<button onclick="resetTimer()" style="font-size:22px;padding:10px 28px;">
リセット
</button>

<div id="resetNote">
黄色の床が出た瞬間に押してください
</div>

</div>

<div class="adjust">
<div class="adjust-label">ズレ調整用ボタン</div>
<button onclick="adjust(-0.5)">−0.5s</button>
<button onclick="adjust(0.5)">＋0.5s</button>
</div>

<video id="player" style="display:none;" playsinline></video>

<script>
let running = false;
let offset = 0;

const fileA = "A.mp4";
const fileB = "B.mp4";

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function playFile(src){
  const p = document.getElementById("player");
  p.src = src;
  p.currentTime = 0;
  await p.play();
}

function adjust(val){ offset += val; }

// ⭐ 通常周期
async function cycle(type){

  const base = Number(interval.value);
  const total = base + offset;

  const start = performance.now();

  while(running){

    const remain = total - (performance.now()-start)/1000;
    if(remain <= 0) break;

    const t = Math.ceil(remain);

    if(remain <= 4){

      if(!caption.dataset.played){
        caption.dataset.played="1";
        playFile(type==="A"?fileA:fileB);
      }

      caption.className = type==="A"?"rainbow":"yellow";
      caption.textContent = (type==="A"?"虹色":"黄色")+"の床まで "+t+"秒";

    }else{
      caption.dataset.played="";
      caption.className="normal";
      caption.textContent="次の床まで "+t+"秒";
    }

    await wait(50);
  }

  if(running){
    caption.textContent="";
    await wait(300);
  }
}

// ⭐ 初回用：音と同時に虹開始
async function firstRainbow(){

  const start = performance.now();

  playFile(fileA); // ⭐ 同時再生

  while(running){

    const remain = 4 - (performance.now()-start)/1000;
    if(remain <= 0) break;

    const t = Math.ceil(remain);

    caption.className="rainbow";
    caption.textContent="虹色の床まで "+t+"秒";

    await wait(50);
  }

  if(running){
    caption.textContent="";
    await wait(300);
  }
}

async function startTimer(initialDelay=true){

  if(running) return;
  running=true;

  if(initialDelay) await wait(1000);

  await firstRainbow();

  while(running){
    await cycle("A");
    await cycle("A");
    await cycle("B");
  }
}

function stopTimer(){
  running=false;
  caption.textContent="";
  player.pause();
}

function toggleTimer(){
  running ? stopTimer() : startTimer(true);
}

async function resetTimer(){

  running=false;
  await wait(20);

  caption.textContent="";
  player.pause();

  startTimer(false);
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    toggleTimer();
  }
});
</script>

</body>
</html>
