<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ルベタイマー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin-top:40px;
}

#caption{
  font-size:44px;
  margin:60px 20px;
  min-height:140px;
  font-weight:bold;
}

.rainbow{
  background: linear-gradient(
    90deg,
    red, orange, yellow, green, cyan, blue, violet
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.yellow{
  color:#ffd800;
}

.normal{
  color:white;
}
</style>
</head>

<body>

<h1 style="font-size:52px;">ルベタイマー</h1>

<div id="caption"></div>

<label>床の間隔（秒）</label><br>
<input type="number" id="interval" value="16" style="font-size:22px;"><br><br>

<button onclick="toggleTimer()" style="font-size:28px;padding:16px 48px;">
開始 / 停止
</button>

<video id="player" style="display:none;" playsinline></video>

<script>
let running = false;

const fileA = "A.mp4";
const fileB = "B.mp4";

function wait(ms){
  return new Promise(r => setTimeout(r, ms));
}

async function playFile(src){
  const player = document.getElementById("player");
  player.src = src;
  player.currentTime = 0;
  await player.play();
}

// ⭐ 入力秒数そのまま表示し、残り4秒で切替
async function cycle(type){

  const total = Number(document.getElementById("interval").value);
  const cap = document.getElementById("caption");

  for(let t = total; t > 0 && running; t--){

    // ⏳ 残り4秒以下で色付き＋動画再生
    if(t <= 4){

      if(t === 4){
        if(type === "A"){
          playFile(fileA);
        }else{
          playFile(fileB);
        }
      }

      if(type === "A"){
        cap.className = "rainbow";
        cap.textContent = "虹色の床まで " + t + "秒";
      }else{
        cap.className = "yellow";
        cap.textContent = "黄色の床まで " + t + "秒";
      }

    }else{
      cap.className = "normal";
      cap.textContent = "次の床まで " + t + "秒";
    }

    await wait(1000);
  }

  // 0秒表示
  if(running){
    if(type === "A"){
      cap.classNameE = "rainbow";
      cap.textContent = "虹色の床まで 0秒";
    }else{
      cap.className = "yellow";
      cap.textContent = "黄色の床まで 0秒";
    }
    await wait(1000);
  }
}

async function startTimer(){
  if(running) return;
  running = true;

  await wait(1000);

  while(running){
    await cycle("A");
    await cycle("A");
    await cycle("B");
  }
}

function stopTimer(){
  running = false;
  document.getElementById("caption").textContent = "";
  const player = document.getElementById("player");
  player.pause();
}

function toggleTimer(){
  if(running) stopTimer();
  else startTimer();
}

document.addEventListener("keydown", e=>{
  if(e.code==="Space"){
    e.preventDefault();
    toggleTimer();
  }
});
</script>

</body>
</html>
