<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ルベタイマー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{background:black;color:white;font-family:sans-serif;text-align:center;margin:0;}
h1{font-size:52px;margin-top:20px;}
#subnote{font-size:18px;opacity:0.7;margin-bottom:20px;}

#caption{
  font-size:46px;
  margin:60px 20px;
  min-height:140px;
  font-weight:bold;
}

.rainbow{
  background:linear-gradient(90deg,
    red,orange,yellow,green,cyan,blue,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.yellow{color:#ffd800;}
.normal{color:white;}

.adjust{
  position:fixed;
  right:10px;
  top:50%;
  transform:translateY(-50%);
}

.adjust button{
  display:block;
  font-size:22px;
  padding:12px;
  margin:8px 0;
}

#adjustLabel{font-size:14px;opacity:0.7;margin-bottom:6px;}

#note{
  position:fixed;
  bottom:10px;
  width:100%;
  font-size:16px;
  opacity:0.6;
}
</style>
</head>

<body>

<h1>ルベタイマー</h1>

<div id="subnote">
グランドカラミティの表示が出た瞬間に押してください
</div>

<div id="caption"></div>

<div>
床の間隔（秒）<br>
<input type="number" id="interval" value="16" step="0.1"
style="font-size:22px;"><br><br>

<button onclick="toggleTimer()"
style="font-size:28px;padding:16px 48px;">
開始 / 停止
</button>

<br><br>

<button onclick="resetTimer()"
style="font-size:22px;padding:10px 30px;">
リセット
</button>

<div style="font-size:14px;opacity:0.7;">
黄色の床が出た瞬間に押してください
</div>
</div>

<div id="note">
グランドカラミティの吹き出しと同時に開始を押してください
</div>

<div class="adjust">
<div id="adjustLabel">ズレ調整用ボタン</div>
<button onclick="adjust(-0.5)">−0.5s</button>
<button onclick="adjust(0.5)">＋0.5s</button>
</div>

<video id="player" style="display:none;" playsinline></video>

<script>
let running=false;
let offset=0;
let loopIndex=0;

const fileA="A.mp4";
const fileB="B.mp4";

function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function adjust(v){offset+=v;}

async function playSound(type){
  const p=player;
  p.src = type==="A"?fileA:fileB;
  p.currentTime=0;
  try{await p.play();}catch{}
}

async function rainbowOnly(type){

  let t=4;
  playSound(type);

  while(running && t>0){

    if(type==="A"){
      caption.className="rainbow";
      caption.textContent="虹色の床まで "+t+"秒";
    }else{
      caption.className="yellow";
      caption.textContent="黄色の床まで "+t+"秒";
    }

    await wait(1000);
    t--;
  }

  caption.textContent="";
}

async function cycle(type){

  const total = Number(interval.value) + offset;
  const start = performance.now();
  let played=false;

  while(running){

    const elapsed=(performance.now()-start)/1000;
    const remain=total-elapsed;

    if(remain<=0) break;

    const t=Math.ceil(remain);

    if(remain<=4){

      if(!played){
        played=true;
        playSound(type);
      }

      if(type==="A"){
        caption.className="rainbow";
        caption.textContent="虹色の床まで "+t+"秒";
      }else{
        caption.className="yellow";
        caption.textContent="黄色の床まで "+t+"秒";
      }

    }else{
      caption.className="normal";
      caption.textContent="次の床まで "+t+"秒";
    }

    await wait(50);
  }

  caption.textContent="";
}

async function mainLoop(){
  const seq=["A","A","B"];
  while(running){
    const type = seq[loopIndex % 3];
    loopIndex++;
    await cycle(type);
  }
}

async function startTimer(){

  if(running) return;

  running=true;
  loopIndex=0;

  // ⭐最初だけ1秒後に虹4秒（A）
  await wait(1000);
  await rainbowOnly("A");

  // ⭐最初のAを消費したので index=1
  loopIndex=1;

  mainLoop();
}

function stopTimer(){
  running=false;
  caption.textContent="";
  player.pause();
}

function toggleTimer(){
  running?stopTimer():startTimer();
}

function resetTimer(){
  stopTimer();
  running=true;
  loopIndex=0;
  mainLoop(); // 即再開（通常A）
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    toggleTimer();
  }
});
</script>

</body>
</html>
