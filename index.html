<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>„Éę„Éô„āŅ„ā§„Éě„Éľ‚ÖĘ</title>
<style>
body {
  background: black;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  text-align: center;
}
h1 {
  font-size: 48px;
}
#display {
  font-size: 64px;
  margin: 30px 0;
  font-family: monospace;
}
button {
  font-size: 24px;
  padding: 15px 40px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="box">
  <h1>„Éę„Éô„āŅ„ā§„Éě„Éľ‚ÖĘ</h1>
  <div id="display">ŚĺÖś©üšł≠</div>
  <button onclick="start()">ťĖčŚßč</button>
</div>

<audio id="A" src="A.mp4"></audio>
<audio id="B" src="B.mp4"></audio>

<script>
let phases = [
  { type: "rainbow", duration: 7 },
  { type: "yellow", duration: 24 },
  { type: "rainbow", duration: 22 },
  { type: "yellow", duration: 24 }
];

let phaseIndex = 0;
let timeLeft = 7;
let timer = null;

function start() {
  phaseIndex = 0;
  timeLeft = 7;
  updateDisplay();

  clearInterval(timer);

  timer = setInterval(() => {
    let phase = phases[phaseIndex];

    // 4.3ÁßíŚČć„Āęťü≥
    if (timeLeft === 5) {
      if (phase.type === "rainbow")
        document.getElementById("A").play();
      else
        document.getElementById("B").play();
    }

    timeLeft--;

    if (timeLeft <= 0) {
      phaseIndex++;

      if (phaseIndex >= phases.length)
        phaseIndex = 2; // 22‚ÜĒ24„Éę„Éľ„Éó

      timeLeft = phases[phaseIndex].duration;
    }

    updateDisplay();

  }, 1000);
}

function updateDisplay() {
  let phase = phases[phaseIndex];

  if (phase.type === "rainbow")
    display.textContent = `ŤôĻ„ĀģŚļä„Āĺ„Āß${timeLeft}Áßí`;
  else
    display.textContent = `ťĽĄŤČ≤„ĀģŚļä„Āĺ„Āß${timeLeft}Áßí`;
}
</script>

</body>
</html>
