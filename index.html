<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ルベタイマー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
}

h1{
  font-size:52px;
  margin-top:20px;
}

#caption{
  font-size:48px;
  margin:80px 20px;
  min-height:140px;
  font-weight:bold;
}

.rainbow{
  background:linear-gradient(90deg,
    red,orange,yellow,green,cyan,blue,violet);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.yellow{ color:#ffd800; }
.normal{ color:white; }
</style>
</head>

<body>

<h1>ルベタイマー</h1>

<div id="caption"></div>

<button onclick="startTimer()"
style="font-size:28px;padding:16px 48px;">
開始
</button>

<video id="player" style="display:none;" playsinline></video>

<script>
let running=false;
let current="A";

const intervalAB = 22.5;
const intervalBA = 24.5;

const fileA="A.mp4";
const fileB="B.mp4";

function wait(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function playSound(type){
  player.src = type==="A"?fileA:fileB;
  player.currentTime=0;
  try{ await player.play(); }catch{}
}

async function cycle(type){

  const total = type==="A"?intervalAB:intervalBA;
  const start = performance.now();
  let played=false;

  while(running){

    const elapsed=(performance.now()-start)/1000;
    const remain=total-elapsed;

    if(remain<=0) break;

    const t=Math.ceil(remain);

    if(remain<=4){

      if(!played){
        played=true;
        playSound(type);
      }

      if(type==="A"){
        caption.className="rainbow";
        caption.textContent="虹色の床まで "+t+"秒";
      }else{
        caption.className="yellow";
        caption.textContent="黄色の床まで "+t+"秒";
      }

    }else{
      caption.className="normal";
      caption.textContent="次の床まで "+t+"秒";
    }

    await wait(50);
  }

  caption.textContent="";
}

async function loop(){

  while(running){

    await cycle(current);

    current = current==="A"?"B":"A";
  }
}

async function startTimer(){

  if(running) return;

  running=true;
  current="A";

  // ⭐ 2.5秒後に A の虹4秒カウント開始
  await wait(2500);

  // Aの4秒カウントを手動実行
  playSound("A");

  for(let t=4; t>0 && running; t--){
    caption.className="rainbow";
    caption.textContent="虹色の床まで "+t+"秒";
    await wait(1000);
  }

  caption.textContent="";

  // その後は通常ループ（次はB）
  current="B";

  loop();
}
</script>

</body>
</html>
